name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t gh93/quakewatch:latest -t gh93/quakewatch:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push gh93/quakewatch:latest
          docker push gh93/quakewatch:${{ github.sha }}
